system:
  name: "Enterprise Knowledge Assistant Local MCP Auto Mode"

defaults:
  model:
    provider: anthropic
    name: claude-haiku-4-5
    temperature: 0.0

execution:
  max_iterations: 10
  max_tool_calls: 10
  max_tool_calls_per_agent: 10
  allow_duplicate_tool_calls: false

mcps:
  local_knowledge_mcp:
    url: "http://127.0.0.1:8765/mcp"

agents:
  local_knowledge_agent:
    name: "Local Enterprise Knowledge Expert"
    description: >
      Uses local enterprise knowledge MCP tools selected from natural-language
      requests so automatic MCP tool execution can be verified end to end.
    auto: true
    prompts:
      system: prompts/local_knowledge_agent/system.md
    mcps:
      - local_knowledge_mcp

graph:
  local_knowledge_agent:
