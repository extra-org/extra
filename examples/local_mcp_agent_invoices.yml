# Local MCP demo — invoices tag (default header transport: X-MCP-Tool-Tag).

system:
  name: "Local MCP Demo (invoices)"

defaults:
  model:
    provider: anthropic
    name: claude-haiku-4-5
    temperature: 0.0

mcps:
  local_demo:
    url: "http://127.0.0.1:8765/mcp"
    tool_tags:
      - "invoices"

agents:
  local_agent:
    name: "Local MCP Agent"
    description: "Answers invoice questions using the local demo MCP server."
    prompts:
      system: "prompts/local_mcp/system.md"
    mcps: [local_demo]

graph:
  local_agent:
