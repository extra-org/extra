# ============================================================================
# AI Research Assistant
#
# Reference example for the declarative Agent Engine.
#
# Demonstrates:
# - Multiple remote MCP servers
# - Public + authenticated MCPs
# - Multi-level orchestration
# - Nested routers
# - Per-agent MCP isolation
# - Shared + agent-scoped resolvers
# - Local tool declarations
# - Generated tool stubs
# - Protected agents
# - Prompt loading
# - Model overrides
# - Access control
#
# This example intentionally combines three extension mechanisms:
#
#   1. Remote MCP servers
#      - DeepWiki
#      - Context7
#
#   2. Local business tools
#      - generated by the framework
#      - implemented by the application developer
#
#   3. LLM orchestration
#      - routers
#      - specialist agents
#      - synthesis
#
# Validate:
#   agentctl validate examples/full-test/agents.yaml
#
# Inspect:
#   agentctl inspect examples/full-test/agents.yaml
# ============================================================================

# ---------------------------------------------------------------------------
# System
# ---------------------------------------------------------------------------

system:
  name: "AI Research Assistant"

# ---------------------------------------------------------------------------
# Defaults
# ---------------------------------------------------------------------------

defaults:
  model:
    provider: anthropic
    name: claude-haiku-4-5
    temperature: 0.0

# ---------------------------------------------------------------------------
# Execution limits (runtime-enforced guardrails)
# ---------------------------------------------------------------------------
# Conservative caps applied per run to prevent runaway loops and repeated calls.
# These are the framework defaults; the block is shown here explicitly. Omit it
# entirely and the same defaults apply. See docs/EXECUTION_LIMITS.md.
execution:
  max_iterations: 20            # model→tools→model rounds allowed per node
  max_tool_calls: 10            # total local/MCP tool calls per run
  max_tool_calls_per_agent: 4   # tool calls per agent per run
  max_child_agent_calls: 8      # orchestrator→child-agent calls per run
  allow_duplicate_tool_calls: false  # block identical (agent+tool+args) repeats

# ---------------------------------------------------------------------------
# Remote MCP Servers
# ---------------------------------------------------------------------------

mcps:

  deepwiki:
    url: "https://mcp.deepwiki.com/mcp"

  context7:
    # Authenticated server. The credential is injected at runtime by the
    # `before_mcp_request` hook (plugins/research_hooks.py), which reads it from
    # the environment — never from this file. We deliberately do NOT use
    # `auth: true` + a static mcp_auth plugin here, to keep a single, explicit
    # auth mechanism (the hook). DeepWiki above is public and stays unauthenticated.
    url: "https://mcp.context7.com/mcp"

# ---------------------------------------------------------------------------
# Local Tool Declarations
# ---------------------------------------------------------------------------
#
# These are intentionally NOT MCP tools.
#
# The framework generates the implementation stubs.
#
# The application developer is responsible for implementing
# the business logic.
# ---------------------------------------------------------------------------

tools:

  generate_decision_matrix:
    description: >
      Generate a structured comparison matrix between technologies using
      repository analysis and official documentation.

  build_learning_plan:
    description: >
      Build a personalized learning roadmap from the collected research
      findings.

# ---------------------------------------------------------------------------
# Resolvers
# ---------------------------------------------------------------------------

resolvers:

  current_date:
    scope: shared

  user_name:
    scope: shared

  preferred_language:
    scope: shared

  experience_level:
    scope: agent

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
# Make the local plugin package importable relative to THIS file, so the hook
# ref `plugins.research_hooks:ResearchHooks` (in plugins/plugins.toml) resolves
# regardless of the shell's working directory.
plugins:
  import_roots:
    - "."

# ---------------------------------------------------------------------------
# Runtime Hooks
# ---------------------------------------------------------------------------
# Trusted application code run at fixed lifecycle points. Implemented in
# plugins/research_hooks.py and registered in plugins/plugins.toml under the
# `research_hooks` plugin id. No secrets appear here — credentials are read from
# the environment inside the hook.
hooks:

  # Fail fast at build time if required credentials are missing.
  on_engine_start:
    - plugin: research_hooks
      method: validate_environment

  # Inject Context7's auth header on outgoing MCP requests. The hook gates on the
  # server id, so it authenticates context7 only and leaves DeepWiki public.
  before_mcp_request:
    - plugin: research_hooks
      method: inject_context7_auth

  # Best-effort audit of safe tool-call metadata. `warn` => a failing audit logs
  # and continues; it never aborts the run.
  after_tool_call:
    - plugin: research_hooks
      method: audit_tool_call
      failure_policy: warn

  # Cap oversized MCP results (e.g. large DeepWiki pages) before they are
  # appended to the agent conversation, to avoid token blow-ups. `warn` => a
  # transform failure logs and passes the ORIGINAL result through, never failing
  # the run.
  transform_tool_result:
    - plugin: research_hooks
      method: truncate_tool_result
      failure_policy: warn

  # Record run failures (by type only — never the message).
  on_run_error:
    - plugin: research_hooks
      method: record_run_failure

# ---------------------------------------------------------------------------
# Orchestrators
# ---------------------------------------------------------------------------

orchestrators:

  research_router:

    name: "Research Router"

    description: >
      Entry point of the system.
      Understands the user's request and decides which high-level workflow
      should execute.

    model:
      provider: anthropic
      name: claude-sonnet-4-6
      temperature: 0.0

    prompts:
      orchestrator: prompts/research_router/orchestrator.md
      system: prompts/research_router/system.md

  knowledge_router:

    name: "Knowledge Router"

    description: >
      Coordinates all information gathering activities.

      Responsible for deciding which knowledge specialists
      should participate in the request.

    prompts:
      orchestrator: prompts/knowledge_router/orchestrator.md
      system: prompts/knowledge_router/system.md

  analysis_router:

    name: "Analysis Router"

    description: >
      Coordinates analysis, comparison and learning workflows
      after knowledge has been collected.

    prompts:
      orchestrator: prompts/analysis_router/orchestrator.md
      system: prompts/analysis_router/system.md

# ---------------------------------------------------------------------------
# Specialist Agents
# ---------------------------------------------------------------------------

agents:

  repository_agent:

    name: "Repository Expert"

    description: >
      Explains repository architecture, project structure,
      implementation details and source code organization.

    prompts:
      system: prompts/repository_agent/system.md

    resolvers:
      - current_date
      - preferred_language

    mcps:
      - deepwiki

  documentation_agent:

    name: "Documentation Expert"

    description: >
      Retrieves official documentation, API references,
      examples and best practices.

    prompts:
      system: prompts/documentation_agent/system.md

    resolvers:
      - preferred_language

    mcps:
      - context7

  enterprise_docs_agent:

    name: "Enterprise Documentation Expert"

    description: >
      Retrieves enterprise documentation available only
      to authorized users.

    prompts:
      system: prompts/enterprise_docs_agent/system.md

    mcps:
      - context7

    protected: true

  comparison_agent:

    name: "Technology Comparison Expert"

    description: >
      Produces objective comparisons by combining repository
      information and official documentation.

    prompts:
      system: prompts/comparison_agent/system.md

    model:
      provider: anthropic
      name: claude-sonnet-4-6
      temperature: 0.0

    tools:
      - generate_decision_matrix

  learning_planner_agent:

    name: "Learning Planner"

    description: >
      Produces personalized learning roadmaps and study plans.

    prompts:
      system: prompts/learning_planner_agent/system.md

    resolvers:
      - experience_level

    tools:
      - build_learning_plan

# ---------------------------------------------------------------------------
# Graph
# ---------------------------------------------------------------------------

graph:

  research_router:

    knowledge_router:

      repository_agent:

      documentation_agent:

      enterprise_docs_agent:

    analysis_router:

      comparison_agent:

      learning_planner_agent: