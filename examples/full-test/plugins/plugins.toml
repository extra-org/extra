# plugins.toml — unified manifest for this client extension package.
#
# ONE manifest for ALL client extension code: hooks, resolvers, and tools.
# It is a catalog/generation companion. The runtime reads only [hooks.plugins]
# to resolve managed hook ids; resolvers and tools load by file path.
# `agentctl generate` creates this file if missing and merges new entries in
# without overwriting manual edits.
#
# SECURITY: never put secrets here. Only import refs and metadata — no tokens,
# client secrets, HMAC keys, or Authorization values.

[package]
name = "plugins"
description = "Client extension package for hooks, resolvers, and tools."

[paths]
hooks = "plugins.hooks"
resolvers = "plugins.resolvers"
tools = "plugins.tools"

[hooks]
on_engine_start = []
on_engine_stop = []
on_run_start = []
on_run_end = []
on_run_error = []
before_tool_call = []
after_tool_call = []
transform_tool_result = []
on_tool_error = []
before_mcp_request = []
after_mcp_response = []

[hooks.plugins]
research_hooks = "plugins.hooks.research_hooks:ResearchHooksHook"

[resolvers]
documentation_agent = "plugins.resolvers.documentation_agent:Resolver"
learning_planner_agent = "plugins.resolvers.learning_planner_agent:Resolver"
repository_agent = "plugins.resolvers.repository_agent:Resolver"
shared = "plugins.resolvers.shared:SharedResolver"

[tools]
build_learning_plan = "plugins.tools.build_learning_plan:build_learning_plan"
generate_decision_matrix = "plugins.tools.generate_decision_matrix:generate_decision_matrix"
