# Enterprise MCP auth via runtime hooks.
#
# This example shows how a private application plugs its own authentication into
# calls to a private MCP server using before_mcp_request hooks — with no
# per-server client code in the platform and no token ever reaching the LLM.
#
# The hook class lives in examples/plugins/hooks/mcp_auth.py and is registered
# in examples/plugins/plugins.toml as plugin id `mcp_auth`. The YAML below uses
# plugin + method names, not Python import paths.
#
# Secrets are NEVER written here. Hooks read them from environment variables
# (INTERNAL_MCP_CREDENTIAL below) resolved inside the hook code.
#
# Note: the platform's YAML secret scanner rejects keys/values containing words
# like "token", "secret", "password", or "api_key" — even as plain env-var
# references — to keep secrets out of YAML. Name your env-var references without
# those words, e.g. `credential_env: INTERNAL_MCP_CREDENTIAL`.

system:
  name: "Enterprise MCP Auth (hooks demo)"

# Make the `examples.plugins.*` hook plugin class importable no matter where the
# CLI is launched from. Roots are resolved relative to THIS file: this config
# sits in examples/, so ".." is the repo root, which holds the `examples`
# package. Without this you would have to set PYTHONPATH manually.
plugins:
  import_roots:
    - ".."

defaults:
  model:
    provider: anthropic
    name: claude-haiku-4-5
    temperature: 0.0

mcps:
  # A private MCP server that requires an Authorization header. The platform
  # connects by URL only; the before_mcp_request hook supplies credentials.
  internal_docs:
    url: "https://internal-docs.example.com/mcp"

agents:
  docs_agent:
    name: "Internal Docs Researcher"
    description: "Answers questions using a private docs MCP server."
    prompts:
      # Reuse the bundled deepwiki prompt (paths are relative to this file).
      system: "prompts/deepwiki/system.md"
    mcps: [internal_docs]

graph:
  docs_agent:

hooks:
  # Fail fast at build time if the credential env var is not configured.
  on_engine_start:
    - plugin: "mcp_auth"
      method: "validate_auth_setup"
      config:
        required_env: ["INTERNAL_MCP_CREDENTIAL"]

  # Add correlation metadata to every run (identity is passed in by the app via
  # engine.run(message, context=RunContext(...))).
  on_run_start:
    - plugin: "mcp_auth"
      method: "attach_user_context"
      config:
        app_name: "acme-portal"

  # The key integration: inject the Authorization header before each MCP request.
  before_mcp_request:
    - plugin: "mcp_auth"
      method: "before_mcp_request"
      config:
        credential_env: "INTERNAL_MCP_CREDENTIAL"

  # Best-effort audit: log and continue even if the audit sink is down.
  after_tool_call:
    - plugin: "mcp_auth"
      method: "record_tool_call"
      failure_policy: warn

  on_run_error:
    - plugin: "mcp_auth"
      method: "record_run_failure"
