# Local MCP demo — docs tag sent via the query_param transport override.

system:
  name: "Local MCP Demo (docs via query param)"

defaults:
  model:
    provider: anthropic
    name: claude-haiku-4-5
    temperature: 0.0

mcps:
  local_demo:
    url: "http://127.0.0.1:8765/mcp"
    tool_tags:
      - "docs"
    tool_tag_transport:
      type: query_param
      param_name: "tag"

agents:
  local_agent:
    name: "Local MCP Agent"
    description: "Answers documentation questions using the local demo MCP server."
    prompts:
      system: "prompts/local_mcp/system.md"
    mcps: [local_demo]

graph:
  local_agent:
